<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Patterns in San Francisco</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #1a1a2e;
        color: #eaeaea;
        scroll-behavior: smooth;
    }

    /* NAVBAR (hidden at start) */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 15px 30px;
        background: rgba(26, 26, 46, 0.9);
        backdrop-filter: blur(10px);
        color: #16c79a;
        font-weight: bold;
        letter-spacing: 1px;
        transform: translateY(-100%);
        transition: transform 0.4s ease;
        z-index: 1000;
    }

    .navbar.show {
        transform: translateY(0);
    }

    /* HERO */
    .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: radial-gradient(circle at center, #16213e 0%, #1a1a2e 80%);
        overflow: hidden;
    }

    .hero-content {
        text-align: center;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .giant-text {
        margin: 0;
        line-height: 0.85;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .giant-text span {
        font-size: clamp(4rem, 18vw, 18rem);
        font-weight: 900;
        color: #16c79a;
        text-transform: uppercase;
        letter-spacing: -0.05em;
        text-shadow: 0 0 25px rgba(22, 199, 154, 0.35);
    }

    .hero p {
        margin-top: 20px;
        font-size: 1.2rem;
        color: #cfcfcf;
    }

    /* PROJECTS */
    .projects {
        padding: 80px 20px;
        max-width: 1100px;
        margin: auto;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
    }

    .btn-card {
        display: block;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        text-decoration: none;
        background: #16213e;
        color: #eaeaea;
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.3s ease;
    }

    .btn-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: #16c79a;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        color: #16c79a;
    }

    .btn-card h3 {
        margin: 0 0 10px;
        color: #16c79a;
    }

    .btn-card p {
        font-size: 0.9rem;
        color: #cfcfcf;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
    Crime In SF
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content" id="heroContent">
        <h1 class="giant-text">
            <span>Crime</span>
            <span>In</span>
            <span>SF</span>
        </h1>
        <p>This visualization is created by Emma</p>
    </div>
</section>

<!-- PROJECTS -->
<section class="projects">
    <div class="grid">
        <a href="#" class="btn-card">
            <h3>Trends</h3>
            <p>20 years of crime evolution</p>
        </a>
        <a href="#" class="btn-card">
            <h3>Map</h3>
            <p>Crime hotspots</p>
        </a>
        <a href="#" class="btn-card">
            <h3>Seasonality</h3>
            <p>Monthly patterns</p>
        </a>
        <a href="#" class="btn-card">
            <h3>Arrests</h3>
            <p>Rates and insights</p>
        </a>
    </div>
</section>

<script>
    const hero = document.querySelector(".hero");
    const heroContent = document.getElementById("heroContent");
    const navbar = document.getElementById("navbar");

    window.addEventListener("scroll", () => {
        const scrollY = window.scrollY;
        const height = hero.offsetHeight;

        // Scale down + fade hero text
        let progress = Math.min(scrollY / height, 1);

        heroContent.style.transform = `scale(${1 - progress * 0.5}) translateY(-${progress * 100}px)`;
        heroContent.style.opacity = 1 - progress * 0.8;

        // Show navbar after scrolling
        if (scrollY > height * 0.6) {
            navbar.classList.add("show");
        } else {
            navbar.classList.remove("show");
        }
    });
</script>

</body>
</html>
