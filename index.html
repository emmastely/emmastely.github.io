<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime in SF</title>

<style>
    body {
        margin: 0;
        background-color: #f2cc60;
        font-family: "Arial Black", Impact, sans-serif;
        color: #1a1a1a;
        text-align: center;
    }

    /* HERO SECTION */
    .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* BIG STACKED TITLE */
    .title {
        line-height: 0.9;
    }

    .title span {
        display: block;
        font-size: clamp(4rem, 14vw, 10rem);
        color: #7fa8c9;
        -webkit-text-stroke: 3px #1a1a1a;
        text-shadow: 6px 6px 0px #5f8fb5;
    }

    /* SUBHEADER */
    .subtitle {
        margin-top: 40px;
        font-family: Arial, sans-serif;
        font-size: 1.4rem;
        max-width: 800px;
        line-height: 1.5;
    }

    /* OPTIONAL: slight hover bounce for fun */
    .title span:hover {
        transform: translateY(-5px);
        transition: transform 0.2s ease;
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .subtitle {
            font-size: 1.1rem;
        }
    }
</style>
</head>

<body>

<section class="hero">
    
    <h1 class="title">
        <span>Crime</span>
        <span>In</span>
        <span>SF</span>
    </h1>

    <p class="subtitle">
        A data analysis and visualization of 8 focus crimes in San Fransisco across the last two decades
    </p>

</section>

</body>
</html>
